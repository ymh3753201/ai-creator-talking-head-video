name: Tests

on:
  push:
    branches: ["main"]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.12"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install FFmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Audit release tree
        run: python3 tools/audit_release.py

      - name: Build skill package
        run: python3 tools/package_skill.py

      - name: Run core tests
        env:
          PYTHONDONTWRITEBYTECODE: "1"
        run: |
          python3 -m unittest \
            tests/test_ai_creator_talking_head_video_skill.py \
            tests/test_ai_creator_talking_head_workflow_engine.py \
            tests/test_ai_creator_talking_head_policy_contracts.py

      - name: Run policy tests
        env:
          PYTHONDONTWRITEBYTECODE: "1"
        run: python3 -m unittest discover -s tests -p 'test_talking_head_*.py'

      - name: Check archive
        run: unzip -t dist/ai-creator-talking-head-video.skill

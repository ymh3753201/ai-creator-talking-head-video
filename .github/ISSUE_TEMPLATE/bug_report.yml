name: Bug report
description: Report a reproducible problem without including secrets or private media.
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Do not paste API keys, customer materials, provider responses containing secrets, or private video files.
  - type: input
    id: version
    attributes:
      label: Version
      description: Git commit or Release version.
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: Problem
      description: What happened, and what did you expect?
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction
      description: Provide the smallest safe reproduction steps.
    validations:
      required: true
  - type: textarea
    id: checks
    attributes:
      label: Validation output
      description: Include sanitized test or audit output.
